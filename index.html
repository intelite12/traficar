<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="icon" type="image/png" sizes="192x192" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#7419AF">

    <title>Traficar Service Pro</title>
    <style>
        :root { --purple: #7419AF; --light: #F5F5F5; --green: #27AE60; }
        body { font-family: 'Montserrat', sans-serif; background: #FFF; margin: 0; padding: 20px; color: #000; -webkit-tap-highlight-color: transparent; }
        
        .money-today { font-size: 28px; font-weight: 800; margin-bottom: 5px; }
        .holiday-badge { display: inline-block; background: #FFD700; font-size: 10px; padding: 4px 12px; border-radius: 20px; font-weight: 800; margin-bottom: 20px; color: #000; }

        h2 { font-weight: 800; font-size: 24px; margin: 0 0 15px 0; letter-spacing: -0.5px; }
        
        input[type="text"], input[type="number"] { 
            width: 100%; padding: 18px; border: 1px solid #E0E0E0; border-radius: 15px; 
            font-size: 16px; box-sizing: border-box; margin-bottom: 20px; 
            font-family: 'Montserrat'; background: var(--light); outline: none; 
            -webkit-appearance: none;
        }
        
        /* Исправленная сетка опций */
        .grid-options { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .opt { 
            background: #F8F8F8; border: 2px solid #EBEBEB; padding: 15px 5px; 
            border-radius: 16px; text-align: center; font-size: 11px; font-weight: 800; color: #555;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        
        /* Исправленные чекбоксы с корпоративным цветом */
        input[type="checkbox"] {
            width: 24px; height: 24px; margin: 0 0 10px 0; cursor: pointer;
            accent-color: var(--purple); /* Фиолетовая галочка */
        }
        
        button { font-family: 'Montserrat'; border: none; cursor: pointer; width: 100%; transition: 0.2s; outline: none; -webkit-appearance: none; }
        .main-btn { background: var(--purple); color: white; padding: 20px; border-radius: 40px; font-weight: 700; font-size: 16px; margin-bottom: 10px; }
        .main-btn:disabled { background: #CCC; cursor: not-allowed; }
        .secondary-btn { background: var(--light); color: #000; padding: 18px; border-radius: 40px; font-weight: 700; font-size: 14px; margin-bottom: 10px; }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 10000; padding: 40px 20px; box-sizing: border-box; overflow-y: auto; }
        .info-table { width: 100%; margin: 30px 0; border-spacing: 0 15px; }
        .info-table td { font-size: 14px; vertical-align: top; }
        .info-table td:first-child { font-weight: 700; color: #999; width: 35%; }

        .date-header { font-size: 12px; color: #999; font-weight: 700; margin: 30px 0 10px; text-transform: uppercase; }
        .log-item { padding: 15px 0; border-bottom: 1px solid #EEE; }
        .log-main { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .earn-val { color: var(--green); font-weight: 800; font-size: 16px; }
        
        .edit-link { color: var(--purple); font-size: 11px; font-weight: 800; text-transform: uppercase; margin-top: 5px; display: inline-block; cursor: pointer; }
        .reason-text { font-size: 11px; color: #666; font-style: italic; margin-top: 4px; }

        #settingsPanel { display: none; margin-top: 20px; padding: 20px; border: 1px solid #EEE; border-radius: 15px; }
    </style>
</head>
<body>

<div id="confirmScreen" class="overlay">
    <h2>Szczegóły stacji</h2>
    <table class="info-table">
        <tr><td>📍 Adres</td><td id="confAddress"></td></tr>
        <tr><td>💬 Koment</td><td id="confComent"></td></tr>
        <tr><td>🕒 Godziny</td><td id="confHours"></td></tr>
    </table>
    <button class="main-btn" id="btnGo">NAWIGUJ</button>
    <button class="secondary-btn" id="btnNext">KOLEJNY WARIANT</button>
    <button class="secondary-btn" style="background:none; color:#999" id="btnCancel">ANULUJ</button>
</div>

<div id="editStawkaScreen" class="overlay">
    <h2>Edytuj Stawkę</h2>
    <p id="editCarNum" style="font-weight:800; color:var(--purple); margin-bottom:25px;"></p>
    
    <div style="font-size:12px; font-weight:700; color:#999; margin-bottom:8px;">DODATKOWA KWOTA (PLN):</div>
    <input type="number" id="inputExtraAmount" placeholder="0" pattern="[0-9]*" inputmode="numeric">
    
    <div style="font-size:12px; font-weight:700; color:#999; margin-bottom:8px;">KOMENTARZ / POWÓD:</div>
    <input type="text" id="inputExtraReason" placeholder="Np. opony, brak płynu...">
    
    <button class="main-btn" id="btnSaveStawka">ZAPISZ</button>
    <button class="secondary-btn" style="background:none; color:#999" onclick="document.getElementById('editStawkaScreen').style.display='none'">ANULUJ</button>
</div>

<div id="appUI">
    <div style="font-size: 11px; font-weight: 700; color: #999; text-transform: uppercase;">Zarobek dzisiaj:</div>
    <div class="money-today" id="totalCashDisplay">0 PLN</div>
    <div id="holidayBadge" class="holiday-badge" style="display:none;">STAWKA ŚWIĄTECZNA</div>

    <h2 style="margin-top: 10px;">Zlecenia</h2>
    <input type="text" id="carInput" placeholder="Numer rejestracyjny" autocomplete="off">
    
    <div class="grid-options">
        <label class="opt"><input type="checkbox" id="checkFuel" checked>FUEL</label>
        <label class="opt"><input type="checkbox" id="checkVacuum">VACUUM</label>
        <label class="opt"><input type="checkbox" id="checkWash">WASH</label>
    </div>

    <button class="main-btn" id="btnSearch" disabled>POBIERANIE BAZY...</button>
    
    <div style="text-align: center; margin-top: 10px;">
        <button id="btnSettings" style="background:none; color:#CCC; font-size:11px; font-weight:700; padding:10px; width:auto;">USTAWIENIA</button>
    </div>

    <div id="settingsPanel">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span style="font-weight:700; font-size:14px">Stawka świąteczna (+7)</span>
            <input type="checkbox" id="holidayToggle" style="margin:0;">
        </div>
    </div>

    <div id="historyList"></div>
</div>

<script>
    var stations = [];
    var holidayMode = false;
    var excludedIds = [];
    var selectedStation = null;
    var activeEditId = null;

    window.onload = function() {
        var today = new Date().toLocaleDateString();
        if (localStorage.getItem('last_date') !== today) {
            localStorage.setItem('last_date', today);
            localStorage.setItem('holiday_on', 'false');
            holidayMode = false;
        } else {
            holidayMode = localStorage.getItem('holiday_on') === 'true';
        }
        document.getElementById('holidayToggle').checked = holidayMode;
        
        document.getElementById('btnSearch').onclick = function() { findStation(false); };
        document.getElementById('btnSettings').onclick = function() {
            var p = document.getElementById('settingsPanel');
            p.style.display = (p.style.display === 'block') ? 'none' : 'block';
        };
        document.getElementById('holidayToggle').onchange = function(e) {
            holidayMode = e.target.checked;
            localStorage.setItem('holiday_on', holidayMode);
            updateUI();
        };
        document.getElementById('btnGo').onclick = goNav;
        document.getElementById('btnNext').onclick = function() { findStation(true); };
        document.getElementById('btnCancel').onclick = closeConfirm;
