<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <title>Traficar Service</title>
    <style>
        :root { 
            --traficar-purple: #7419AF; 
            --traficar-light-gray: #F5F5F5;
            --text-main: #000000;
        }
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            background: #FFFFFF; 
            margin: 0; 
            padding: 20px; 
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        h2 { font-weight: 800; font-size: 24px; margin-bottom: 20px; letter-spacing: -0.5px; }
        
        /* Статистика сверху */
        .header-stats { margin-bottom: 30px; }
        .money-today { font-size: 28px; font-weight: 800; color: var(--text-main); }
        .holiday-badge { 
            display: inline-block;
            background: #FFD700; 
            font-size: 10px; 
            padding: 4px 12px; 
            border-radius: 20px; 
            font-weight: 800; 
            margin-top: 5px;
        }

        /* Поля ввода и опции */
        input[type="text"] { 
            width: 100%; 
            padding: 18px; 
            border: 1px solid #E0E0E0; 
            border-radius: 15px; 
            font-size: 16px; 
            box-sizing: border-box; 
            margin-bottom: 20px; 
            font-family: 'Montserrat';
            background: var(--traficar-light-gray);
        }

        .grid-options { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .opt { 
            background: var(--traficar-light-gray); 
            padding: 15px 5px; 
            border-radius: 15px; 
            text-align: center; 
            font-size: 10px; 
            font-weight: 700;
            color: #666;
        }
        .opt input { transform: scale(1.2); margin-bottom: 8px; }
        
        /* Кнопки в стиле Traficar */
        button { font-family: 'Montserrat'; border: none; transition: opacity 0.2s; cursor: pointer; }
        button:active { opacity: 0.7; }

        .main-btn { 
            width: 100%; 
            background: var(--traficar-purple); 
            color: white; 
            padding: 20px; 
            border-radius: 40px; 
            font-weight: 700; 
            font-size: 16px;
            margin-bottom: 15px;
        }

        .secondary-btn {
            background: var(--traficar-light-gray);
            color: var(--text-main);
            padding: 15px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 14px;
        }

        /* Экран подтверждения Orlen */
        #confirmScreen { 
            display: none; 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: white; z-index: 1000; padding: 30px 20px; box-sizing: border-box; 
        }
        
        .info-table { width: 100%; margin: 30px 0; border-spacing: 0 15px; }
        .info-table td { font-size: 14px; vertical-align: top; }
        .info-table td:first-child { font-weight: 700; color: #999; width: 35%; }
        .info-table td:last-child { font-weight: 600; color: #000; }

        /* История сервисов */
        .date-header { font-size: 12px; color: #999; font-weight: 700; margin: 30px 0 15px; text-transform: uppercase; }
        .log-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 0; 
            border-bottom: 1px solid #EEE;
        }
        .log-item strong { font-size: 16px; font-weight: 700; }
        .log-item small { color: #999; font-weight: 600; }
        .earn-text { color: #27AE60; font-weight: 800; font-size: 16px; }
        .del-icon { color: #CCC; font-size: 20px; padding-left: 15px; }

        .settings-panel { display: none; margin-top: 20px; border-top: 1px solid #EEE; padding-top: 20px; }
    </style>
</head>
<body>

<div id="confirmScreen">
    <h2>Подходящий Orlen</h2>
    <table class="info-table">
        <tr><td>📍 Адрес</td><td id="confAddress"></td></tr>
        <tr><td>💬 Коммент</td><td id="confComent"></td></tr>
        <tr><td>🕒 Часы работы</td><td id="confHours"></td></tr>
    </table>
    
    <button class="main-btn" onclick="confirmNavigation()">Nawiguj</button>
    
    <div style="display: grid; grid-template-columns: 1fr; gap: 10px;">
        <button class="secondary-btn" onclick="findWork(true)">Следующий вариант</button>
        <button class="secondary-btn" style="background:none" onclick="closeConfirm()">Anuluj</button>
    </div>
</div>

<div class="header-stats">
    <div style="font-size: 12px; font-weight: 700; color: #999; margin-bottom: 5px;">DZISIEJSZY ZAROBEK:</div>
    <div class="money-today" id="todaySum">0 PLN</div>
    <div id="holidayIndicator" class="holiday-badge">ПРАЗДНИЧНАЯ СТАВКА</div>
</div>

<div id="mainForm">
    <h2>Новое задание</h2>
    <input type="text" id="carNumber" placeholder="Numer rejestracyjny" autocomplete="off">
    
    <div class="grid-options">
        <div class="opt"><input type="checkbox" id="petrol" checked><br>FUEL</div>
        <div class="opt"><input type="checkbox" id="vacuum"><br>VACUUM</div>
        <div class="opt"><input type="checkbox" id="wash"><br>WASH</div>
    </div>

    <button class="main-btn" onclick="findWork(false)">Znajdź Orlen</button>
</div>

<div style="text-align: center; margin-top: 10px;">
    <button class="secondary-btn" style="background:none; color:#CCC; font-size:11px" onclick="toggleSettings()">Ustawienia</button>
</div>

<div id="settings" class="settings-panel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
        <span style="font-weight:700; font-size:14px">Праздничная ставка (+7 PLN)</span>
        <input type="checkbox" id="holidayToggle" onchange="toggleHoliday()" style="transform: scale(1.5);">
    </div>
    <button class="secondary-btn" style="width:100%" onclick="toggleSettings()">Закрыть</button>
</div>

<div id="historyList"></div>

    let state = { holidayMode: false, lastDate: new Date().toLocaleDateString() };
    let currentFoundStation = null;
    let excludedIds = [];

    function init() {
        const saved = JSON.parse(localStorage.getItem('traficar_state_v3'));
        const today = new Date().toLocaleDateString();
        if(saved) {
            state = saved;
            if(state.lastDate !== today) {
                state.holidayMode = false;
                state.lastDate = today;
                localStorage.setItem('traficar_state_v3', JSON.stringify(state));
            }
        }
        document.getElementById('holidayToggle').checked = state.holidayMode;
        render();
    }

    function isStationOpen(hours) {
        const now = new Date();
        const cur = now.getHours() * 60 + now.getMinutes();
        const [start, end] = hours.split(' - ').map(t => {
            const [h, m] = t.split(':').map(Number);
            return h * 60 + m;
        });
        return end < start ? (cur >= start || cur <= end) : (cur >= start && cur <= end);
    }

    function findWork(isNext) {
        const car = document.getElementById('carNumber').value.toUpperCase().trim();
        if(!car) return alert("Введите номер машины!");
        if(!isNext) excludedIds = [];

        navigator.geolocation.getCurrentPosition(pos => {
            const uLat = pos.coords.latitude;
            const uLon = pos.coords.longitude;
            const needV = document.getElementById('vacuum').checked;
            const needW = document.getElementById('wash').checked;

            let filtered = orlenData.filter(s => 
                (!needV || s.vacuum === 1) &&[cite: 1]
                (!needW || s.wash === 1) &&[cite: 1]
                !excludedIds.includes(s.id) &&[cite: 1]
                isStationOpen(s.open_hours)[cite: 1]
            );

            if(!filtered.length) {
                alert("Больше вариантов нет");
                return isNext && closeConfirm();
            }

            currentFoundStation = filtered.reduce((prev, curr) => 
                Math.hypot(uLat-prev.lat, uLon-prev.lon) < Math.hypot(uLat-curr.lat, uLon-curr.lon) ? prev : curr
            );

            excludedIds.push(currentFoundStation.id);
            document.getElementById('confAddress').innerText = currentFoundStation.adress;
            document.getElementById('confComent').innerText = currentFoundStation.coment;
            document.getElementById('confHours').innerText = currentFoundStation.open_hours;
            document.getElementById('confirmScreen').style.display = 'block';
        });
    }

    function confirmNavigation() {
        const car = document.getElementById('carNumber').value.toUpperCase().trim();
        const entry = {
            id: Date.now(), car, date: new Date().toLocaleDateString(),
            time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
            earn: state.holidayMode ? 28 : 21,
            station: currentFoundStation.coment
        };
        const logs = JSON.parse(localStorage.getItem('traficar_pro_logs') || "[]");
        logs.unshift(entry);
        localStorage.setItem('traficar_pro_logs', JSON.stringify(logs));
        
        window.location.href = `https://www.google.com/maps/dir/?api=1&destination=${currentFoundStation.lat},${currentFoundStation.lon}`;
        closeConfirm();
        render();
    }

    function closeConfirm() { document.getElementById('confirmScreen').style.display = 'none'; }
    function toggleSettings() { 
        const s = document.getElementById('settings');
        s.style.display = s.style.display === 'block' ? 'none' : 'block';
    }

    function deleteEntry(id) {
        if(confirm("Удалить запись?")) {
            const h = JSON.parse(localStorage.getItem('traficar_pro_logs') || "[]");
            localStorage.setItem('traficar_pro_logs', JSON.stringify(h.filter(i => i.id !== id)));
            render();
        }
    }

    function toggleHoliday() {
        state.holidayMode = document.getElementById('holidayToggle').checked;
        localStorage.setItem('traficar_state_v3', JSON.stringify(state));
        render();
    }

    function render() {
        const logs = JSON.parse(localStorage.getItem('traficar_pro_logs') || "[]");
        const today = new Date().toLocaleDateString();
        const todayEarn = logs.filter(i => i.date === today).reduce((s, i) => s + i.earn, 0);
        
        document.getElementById('todaySum').innerText = todayEarn + " PLN";
        document.getElementById('holidayIndicator').style.display = state.holidayMode ? 'block' : 'none';

        const groups = logs.reduce((acc, i) => {
            if(!acc[i.date]) acc[i.date] = [];
            acc[i.date].push(i);
            return acc;
        }, {});

        let html = '';
        for(let date in groups) {
            html += `<div class="date-header">${date === today ? 'Сегодня' : date}</div>`;
            html += groups[date].map(i => `
                <div class="log-item">
                    <div>
                        <strong>${i.car}</strong><br>
                        <small>${i.time} • ${i.station}</small>
                    </div>
                    <div style="display:flex; align-items:center">
                        <span class="earn-text">+${i.earn}</span>
                        <span class="del-icon" onclick="deleteEntry(${i.id})">×</span>
                    </div>
                </div>
            `).join('');
        }
        document.getElementById('historyList').innerHTML = html;
    }

    init();
