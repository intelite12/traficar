<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Traficar Orlen Service</title>
    <style>
        :root { --orlen-red: #e02424; --bg: #f4f7f6; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 18px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); margin-bottom: 15px; }
        input[type="text"] { width: 100%; padding: 14px; border: 2px solid #efefef; border-radius: 10px; font-size: 16px; box-sizing: border-box; margin-bottom: 15px; }
        .grid-options { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .opt { background: #fafafa; border: 1px solid #eee; padding: 10px 5px; border-radius: 10px; text-align: center; font-size: 12px; }
        .opt input { margin-bottom: 5px; transform: scale(1.2); }
        button { width: 100%; background: var(--orlen-red); color: white; border: none; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: bold; }
        .history { background: white; border-radius: 18px; padding: 15px; }
        .log-item { border-bottom: 1px solid #f0f0f0; padding: 10px 0; font-size: 14px; }
        .log-item:last-child { border-bottom: none; }
        .tag { font-size: 10px; background: #eee; padding: 2px 6px; border-radius: 4px; margin-right: 4px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-top:0; font-size: 18px;">Обслуживание авто</h2>
    <input type="text" id="carNumber" placeholder="Номер машины..." autocomplete="off">
    
    <div class="grid-options">
        <div class="opt"><input type="checkbox" id="petrol" checked> <br>Заправка</div>
        <div class="opt"><input type="checkbox" id="vacuum"> <br>Пылесос</div>
        <div class="opt"><input type="checkbox" id="wash"> <br>Мойка</div>
    </div>

    <button onclick="startService()">Найти ближайший Orlen</button>
</div>

<div class="history">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3 style="font-size: 16px;">Сегодняшние записи</h3>
        <button onclick="copyLogs()" style="width:auto; padding: 6px 12px; font-size: 12px; background: #555;">Копировать</button>
    </div>
    <div id="logList"></div>
</div>

<script>
    // ДАННЫЕ ИЗ ВАШЕЙ ТАБЛИЦЫ
    const orlenData = [
        { id: "WAW01", adress: "Wawrzyńca Surowieckiego 14", lat: 52.15716068, lon: 21.02050067, vacuum: 1, wash: 1, coment: "Kamil" },
        { id: "WAW02", adress: "Śródziemnomorska 65", lat: 52.17671363, lon: 21.04534754, vacuum: 1, wash: 0, coment: "Charnomorska" },
        { id: "WAW03", adress: "Migdałowa 2", lat: 52.14800023, lon: 21.05961734, vacuum: 0, wash: 0, coment: "Bespoleznaya" },
        { id: "WAW04", adress: "Antoniego Malczewskiego 1", lat: 52.19459585, lon: 21.02387832, vacuum: 0, wash: 0, coment: "Pulawska malenkaja" },
        { id: "WAW05", adress: "aleja Wyścigowa 2", lat: 52.16590022, lon: 21.01578848, vacuum: 0, wash: 0, coment: "Wyscigowa" }
        // Сюда можно вставлять новые строки из JSON-конвертера
    ];

    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function startService() {
        const car = document.getElementById('carNumber').value.toUpperCase().trim();
        if (!car) return alert("Введите номер машины!");

        const needV = document.getElementById('vacuum').checked;
        const needW = document.getElementById('wash').checked;

        navigator.geolocation.getCurrentPosition(pos => {
            const uLat = pos.coords.latitude;
            const uLon = pos.coords.longitude;

            // Фильтр по услугам (1 - есть, 0 - нет)
            let filtered = orlenData.filter(s => 
                (!needV || s.vacuum === 1) && (!needW || s.wash === 1)
            );

            if (filtered.length === 0) return alert("Нет подходящих заправок с мойкой/пылесосом!");

            // Поиск ближайшей
            let closest = filtered.reduce((prev, curr) => 
                getDistance(uLat, uLon, prev.lat, prev.lon) < getDistance(uLat, uLon, curr.lat, curr.lon) ? prev : curr
            );

            // Сохранение лога
            const serviceList = [];
            if (document.getElementById('petrol').checked) serviceList.push("⛽");
            if (needV) serviceList.push("🌀");
            if (needW) serviceList.push("🧽");

            saveLog(car, serviceList.join(' '), closest.coment);

            // Навигация
            window.location.href = `https://www.google.com/maps/dir/?api=1&destination=${closest.lat},${closest.lon}`;
        }, () => alert("Разрешите доступ к GPS!"));
    }

    function saveLog(car, services, stationName) {
        const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        const history = JSON.parse(localStorage.getItem('traficar_history') || "[]");
        history.unshift({ car, services, stationName, time });
        localStorage.setItem('traficar_history', JSON.stringify(history.slice(0, 30))); // храним 30 записей
        render();
    }

    function render() {
        const history = JSON.parse(localStorage.getItem('traficar_history') || "[]");
        document.getElementById('logList').innerHTML = history.map(i => `
            <div class="log-item">
                <span style="font-weight:bold">${i.car}</span> <span class="tag">${i.services}</span> 
                <span style="float:right; color:gray; font-size:12px;">${i.time}</span><br>
                <small style="color: #888">${i.stationName}</small>
            </div>
        `).join('');
    }

    function copyLogs() {
        const history = JSON.parse(localStorage.getItem('traficar_history') || "[]");
        const text = history.map(i => `${i.time} - ${i.car} - ${i.services} - ${i.stationName}`).join('\n');
        navigator.clipboard.writeText(text).then(() => alert("Скопировано!"));
    }

    render();
</script>

</body>
</html>
