<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <title>Traficar Drive</title>
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        :root { --purple: #7419AF; --light: #F5F5F5; --green: #27AE60; }
        body { font-family: 'Montserrat', sans-serif; background: #FFF; margin: 0; padding: 20px; color: #000; -webkit-tap-highlight-color: transparent; }
        
        /* Статистика */
        .money-today { font-size: 28px; font-weight: 800; margin-bottom: 5px; }
        .holiday-badge { display: inline-block; background: #FFD700; font-size: 10px; padding: 4px 12px; border-radius: 20px; font-weight: 800; margin-bottom: 20px; }

        h2 { font-weight: 800; font-size: 24px; margin: 0 0 15px 0; letter-spacing: -0.5px; }
        input { width: 100%; padding: 18px; border: 1px solid #E0E0E0; border-radius: 15px; font-size: 16px; box-sizing: border-box; margin-bottom: 20px; font-family: 'Montserrat'; background: var(--light); }
        
        .grid-options { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .opt { background: var(--light); padding: 15px 5px; border-radius: 12px; text-align: center; font-size: 10px; font-weight: 700; color: #666; }
        .opt input { display: block; margin: 0 auto 8px; transform: scale(1.3); }
        
        button { font-family: 'Montserrat'; border: none; cursor: pointer; width: 100%; transition: 0.2s; outline: none; }
        .main-btn { background: var(--purple); color: white; padding: 20px; border-radius: 40px; font-weight: 700; font-size: 16px; margin-bottom: 10px; }
        .secondary-btn { background: var(--light); color: #000; padding: 18px; border-radius: 40px; font-weight: 700; font-size: 14px; margin-bottom: 10px; }

        /* Экран подтверждения */
        #confirmScreen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 10000; padding: 40px 20px; box-sizing: border-box; }
        .info-table { width: 100%; margin: 30px 0; border-spacing: 0 15px; }
        .info-table td { font-size: 14px; vertical-align: top; }
        .info-table td:first-child { font-weight: 700; color: #999; width: 35%; }

        /* История */
        .date-header { font-size: 12px; color: #999; font-weight: 700; margin: 30px 0 10px; text-transform: uppercase; }
        .log-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #EEE; }
        .earn-val { color: var(--green); font-weight: 800; font-size: 16px; }
        
        #settingsPanel { display: none; margin-top: 20px; padding: 20px; border: 1px solid #EEE; border-radius: 15px; }
    </style>
</head>
<body>

<div id="confirmScreen">
    <h2 id="confTitle">Szczegóły stacji</h2>
    <table class="info-table">
        <tr><td>📍 Adres</td><td id="confAddress"></td></tr>
        <tr><td>💬 Koment</td><td id="confComent"></td></tr>
        <tr><td>🕒 Godziny</td><td id="confHours"></td></tr>
    </table>
    <button class="main-btn" id="btnGo">NAWIGUJ</button>
    <button class="secondary-btn" id="btnNext">KOLEJNY WARIANT</button>
    <button class="secondary-btn" style="background:none; color:#999" id="btnCancel">ANULUJ</button>
</div>

<div id="appUI">
    <div style="font-size: 11px; font-weight: 700; color: #999; text-transform: uppercase;">Zarobek dzisiaj:</div>
    <div class="money-today" id="totalCashDisplay">0 PLN</div>
    <div id="holidayBadge" class="holiday-badge" style="display:none;">STAWKA ŚWIĄTECZNA</div>

    <h2 style="margin-top: 10px;">Zlecenia</h2>
    <input type="text" id="carInput" placeholder="Numer rejestracyjny" autocomplete="off">
    
    <div class="grid-options">
        <div class="opt"><input type="checkbox" id="checkFuel" checked>FUEL</div>
        <div class="opt"><input type="checkbox" id="checkVacuum">VACUUM</div>
        <div class="opt"><input type="checkbox" id="checkWash">WASH</div>
    </div>

    <button class="main-btn" id="btnSearch">ZNAJDŹ ORLEN</button>
    
    <div style="text-align: center; margin-top: 10px;">
        <button id="btnSettings" style="background:none; color:#CCC; font-size:11px; font-weight:700; padding:10px; width:auto;">USTAWIENIA</button>
    </div>

    <div id="settingsPanel">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span style="font-weight:700; font-size:14px">Stawka świąteczna (+7)</span>
            <input type="checkbox" id="holidayToggle" style="width:auto; margin:0; transform: scale(1.5);">
        </div>
    </div>

    <div id="historyList"></div>
</div>

<script>
    // ТВОЙ ПОЛНЫЙ СПИСОК ЗАПРАВОК
    const stations = [
        { id: 'WAW01', addr: 'Wawrzyńca Surowieckiego 14, 02-784 Warszawa', lat: 52.15716068, lon: 21.02050067, com: 'Камили', vac: 1, wash: 1, hours: '00:00 - 23:59' },
        { id: 'WAW02', addr: 'Śródziemnomorska 65, 02-758 Warszawa', lat: 52.17671363, lon: 21.04534754, com: 'Чарноморска', vac: 1, wash: 0, hours: '00:00 - 23:59' },
        { id: 'WAW03', addr: 'Migdałowa 2, 02-796 Warszawa', lat: 52.14800023, lon: 21.05961734, com: 'Безполезная', vac: 0, wash: 0, hours: '00:00 - 23:59' },
        { id: 'WAW04', addr: 'Antoniego Malczewskiego 1, 02-617 Warszawa', lat: 52.19459585, lon: 21.02387832, com: 'Puławska маленькая', vac: 0, wash: 0, hours: '06:00 - 22:00' },
        { id: 'WAW05', addr: 'aleja Wyścigowa 2, 02-681 Warszawa', lat: 52.16590022, lon: 21.01578848, com: 'Wyscigowa', vac: 0, wash: 0, hours: '00:00 - 23:59' },
        { id: 'WAW06', addr: 'Postępu 16, 02-676 Warszawa', lat: 52.18052375, lon: 20.99809104, com: 'Postępu', vac: 1, wash: 1, hours: '00:00 - 23:59' },
        { id: 'WAW07', addr: 'Wołoska 28, 02-675 Warszawa', lat: 52.18723776, lon: 21.00275480, com: 'Wołoska (Димка)', vac: 1, wash: 1, hours: '00:00 - 23:59' },
        { id: 'WAW08', addr: 'Bolesława Limanowskiego 25, 02-943 Warszawa', lat: 52.18793911, lon: 21.05036444, com: 'Mangalia', vac: 1, wash: 0, hours: '00:00 - 23:59' },
        { id: 'WAW09', addr: 'Powsińska 14, 02-920 Warszawa', lat: 52.18078647, lon: 21.07079854, com: 'Powśinska', vac: 1, wash: 0, hours: '00:00 - 23:59' },
        { id: 'WAW10', addr: 'Dolna 1, 00-773 Warszawa', lat: 52.20158043, lon: 21.03445485, com: 'Dolna', vac: 0, wash: 0, hours: '00:00 - 23:59' },
        { id: 'WAW11', addr: 'Jamesa Gordona Bennetta 2A, 02-159 Warszawa', lat: 52.16785276, lon: 20.97893344, com: 'Lotnisko', vac: 1, wash: 1, hours: '00:00 - 23:59' },
        { id: 'WAW12', addr: 'Franciszka Hynka 2, 02-149 Warszawa', lat: 52.18625203, lon: 20.97096608, com: 'Hynka', vac: 1, wash: 0, hours: '00:00 - 23:59' },
        { id: 'WAW13', addr: 'Rakowiecka 38, 02-532 Warszawa', lat: 52.20630316, lon: 21.00011178, com: 'Rakowiecka', vac: 0, wash: 0, hours: '00:00 - 23:59' },
        { id: 'WAW14', addr: 'Polna 1A, 00-622 Warszawa', lat: 52.21429362, lon: 21.02021415, com: 'Polna', vac: 0, wash: 0, hours: '00:00 - 23:59' },
        { id: 'WAW15', addr: 'al. Niepodległości 206, 00-608 Warszawa', lat: 52.21531281, lon: 21.00623435, com: 'Niepodległości', vac: 0, wash: 0, hours: '00:00 - 23:59' },
        { id: 'WAW16', addr: 'Czerniakowska 149A, 00-453 Warszawa', lat: 52.21291801, lon: 21.04622429, com: 'Александра', vac: 1, wash: 1, hours: '00:00 - 23:59' },
        { id: 'WAW17', addr: 'Al. 3 Maja 1A, 00-401 Warszawa', lat: 52.23466816, lon: 21.03606967, com: '3 Maja', vac: 0, wash: 0, hours: '00:00 - 23:59' },
        { id: 'WAW18', addr: 'Wawelska 3B, 02-034 Warszawa', lat: 52.21670048, lon: 20.99858724, com: 'Wawelska', vac: 1, wash: 0, hours: '00:00 - 23:59' }
    ];

    let holidayMode = false;
    let excludedIds = [];
    let selectedStation = null;

    // ГАРАНТИРОВАННЫЙ ЗАПУСК КНОПОК
    document.addEventListener('DOMContentLoaded', () => {
        const today = new Date().toLocaleDateString();
        const savedDate = localStorage.getItem('last_date');
        
        if (savedDate === today) {
            holidayMode = localStorage.getItem('holiday_on') === 'true';
        } else {
            localStorage.setItem('last_date', today);
            localStorage.setItem('holiday_on', 'false');
            holidayMode = false;
        }

        document.getElementById('holidayToggle').checked = holidayMode;

        // Привязка кликов
        document.getElementById('btnSearch').onclick = () => findStation(false);
        document.getElementById('btnSettings').onclick = toggleSettings;
        document.getElementById('holidayToggle').onchange = updateHoliday;
        document.getElementById('btnGo').onclick = goNav;
        document.getElementById('btnNext').onclick = () => findStation(true);
        document.getElementById('btnCancel').onclick = () => document.getElementById('confirmScreen').style.display = 'none';

        updateUI();
    });

    function toggleSettings() {
        const p = document.getElementById('settingsPanel');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    }

    function updateHoliday() {
        holidayMode = document.getElementById('holidayToggle').checked;
        localStorage.setItem('holiday_on', holidayMode);
        updateUI();
    }

    function isStationOpen(hStr) {
        try {
            const now = new Date();
            const current = now.getHours() * 60 + now.getMinutes();
            const [start, end] = hStr.split(' - ').map(t => {
                const [h, m] = t.split(':').map(Number);
                return h * 60 + m;
            });
            return end < start ? (current >= start || current <= end) : (current >= start && current <= end);
        } catch(e) { return true; }
    }

    function findStation(isNext) {
        const car = document.getElementById('carInput').value.trim().toUpperCase();
        if (!car) return alert("Wprowadź numer!");

        if (!isNext) excludedIds = [];

        navigator.geolocation.getCurrentPosition(pos => {
            const uLat = pos.coords.latitude;
            const uLon = pos.coords.longitude;
            const needVac = document.getElementById('checkVacuum').checked;
            const needWash = document.getElementById('checkWash').checked;

            const filtered = stations.filter(s => 
                (!needVac || s.vac === 1) && 
                (!needWash || s.wash === 1) && 
                !excludedIds.includes(s.id) && 
                isStationOpen(s.hours)
            );

            if (filtered.length === 0) {
                alert("Brak stacji!");
                if (isNext) document.getElementById('confirmScreen').style.display = 'none';
                return;
            }

            selectedStation = filtered.reduce((prev, curr) => 
                Math.hypot(uLat - prev.lat, uLon - prev.lon) < Math.hypot(uLat - curr.lat, uLon - curr.lon) ? prev : curr
            );

            excludedIds.push(selectedStation.id);

            document.getElementById('confAddress').innerText = selectedStation.addr;
            document.getElementById('confComent').innerText = selectedStation.com;
            document.getElementById('confHours').innerText = selectedStation.hours;
            document.getElementById('confirmScreen').style.display = 'block';
        }, () => alert("Włącz GPS!"));
    }

    function goNav() {
        const car = document.getElementById('carInput').value.trim().toUpperCase();
        const logs = JSON.parse(localStorage.getItem('logs_v7') || "[]");
        
        logs.unshift({
            id: Date.now(),
            car,
            date: new Date().toLocaleDateString(),
            time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
            earn: holidayMode ? 28 : 21,
            station: selectedStation.com
        });

        localStorage.setItem('logs_v7', JSON.stringify(logs));
        document.getElementById('confirmScreen').style.display = 'none';
        updateUI();
        window.location.href = `https://www.google.com/maps/dir/?api=1&destination=${selectedStation.lat},${selectedStation.lon}`;
    }

    function deleteLog(id) {
        if (confirm("Usunąć?")) {
            let logs = JSON.parse(localStorage.getItem('logs_v7') || "[]");
            localStorage.setItem('logs_v7', JSON.stringify(logs.filter(l => l.id !== id)));
            updateUI();
        }
    }

    function updateUI() {
        const logs = JSON.parse(localStorage.getItem('logs_v7') || "[]");
        const today = new Date().toLocaleDateString();
        const earned = logs.filter(l => l.date === today).reduce((sum, l) => sum + l.earn, 0);

        document.getElementById('totalCashDisplay').innerText = earned + " PLN";
        document.getElementById('holidayBadge').style.display = holidayMode ? 'block' : 'none';

        const groups = logs.reduce((acc, l) => {
            if (!acc[l.date]) acc[l.date] = [];
            acc[l.date].push(l);
            return acc;
        }, {});

        let html = '';
        Object.keys(groups).sort((a,b) => new Date(b) - new Date(a)).forEach(date => {
            html += `<div class="date-header">${date === today ? 'Dzisiaj' : date}</div>`;
            html += groups[date].map(l => `
                <div class="log-item">
                    <div><strong>${l.car}</strong><br><small>${l.time} • ${l.station}</small></div>
                    <div style="display:flex; align-items:center;">
                        <span class="earn-val">+${l.earn}</span>
                        <span style="color:#CCC; margin-left:15px; font-size:24px;" onclick="deleteLog(${l.id})">×</span>
                    </div>
                </div>
            `).join('');
        });
        document.getElementById('historyList').innerHTML = html;
    }
</script>
</body>
</html>
