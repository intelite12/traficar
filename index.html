    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <title>Traficar Service</title>
    <style>
        :root { --purple: #7419AF; --light: #F5F5F5; }
        body { font-family: 'Montserrat', sans-serif; background: #FFF; margin: 0; padding: 20px; color: #000; -webkit-tap-highlight-color: transparent; }
        
        /* Статистика */
        .money-today { font-size: 28px; font-weight: 800; margin-bottom: 5px; }
        .holiday-badge { display: inline-block; background: #FFD700; font-size: 10px; padding: 4px 12px; border-radius: 20px; font-weight: 800; margin-bottom: 20px; }

        h2 { font-weight: 800; font-size: 24px; margin: 0 0 15px 0; }
        input { width: 100%; padding: 18px; border: 1px solid #E0E0E0; border-radius: 15px; font-size: 16px; box-sizing: border-box; margin-bottom: 20px; font-family: 'Montserrat'; background: var(--light); }
        
        .grid-options { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .opt { background: var(--light); padding: 15px 5px; border-radius: 12px; text-align: center; font-size: 10px; font-weight: 700; color: #666; }
        .opt input { display: block; margin: 0 auto 8px; transform: scale(1.3); }
        
        button { font-family: 'Montserrat'; border: none; cursor: pointer; width: 100%; transition: 0.2s; outline: none; }
        .main-btn { background: var(--purple); color: white; padding: 20px; border-radius: 40px; font-weight: 700; font-size: 16px; margin-bottom: 10px; }
        .secondary-btn { background: var(--light); color: #000; padding: 18px; border-radius: 40px; font-weight: 700; font-size: 14px; margin-bottom: 10px; }

        /* Экран подтверждения */
        #confirmScreen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 10000; padding: 40px 20px; box-sizing: border-box; }
        .info-table { width: 100%; margin: 30px 0; border-spacing: 0 15px; }
        .info-table td { font-size: 14px; vertical-align: top; }
        .info-table td:first-child { font-weight: 700; color: #999; width: 35%; }

        /* История */
        .date-header { font-size: 12px; color: #999; font-weight: 700; margin: 30px 0 10px; text-transform: uppercase; }
        .log-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #EEE; }
        .earn-green { color: #27AE60; font-weight: 800; font-size: 16px; }
        
        #settingsPanel { display: none; margin-top: 20px; padding: 20px; border: 1px solid #EEE; border-radius: 15px; }
    </style>
</head>
<body>

<div id="confirmScreen">
    <h2 id="confTitle">Szczegóły trasy</h2>
    <table class="info-table">
        <tr><td>📍 Adres</td><td id="confAddress"></td></tr>

        <tr><td>🕒 Godziny</td><td id="confHours"></td></tr>
    </table>
    <button class="main-btn" id="btnNawiguj">NAWIGUJ</button>
    <button class="secondary-btn" id="btnNext">KOLEJNY WARIANT</button>
    <button class="secondary-btn" style="background:none; color:#999" id="btnCancel">ANULUJ</button>
</div>

<div id="appBody">
    <div style="font-size: 11px; font-weight: 700; color: #999; text-transform: uppercase;">Zarobek dzisiaj:</div>
    <div class="money-today" id="totalCash">0 PLN</div>
    <div id="holidayLabel" class="holiday-badge" style="display:none;">STAWKA ŚWIĄTECZNA</div>

    <h2 style="margin-top: 10px;">Zlecenia</h2>
    <input type="text" id="carInput" placeholder="Numer rejestracyjny" autocomplete="off">
    
    <div class="grid-options">
        <div class="opt"><input type="checkbox" id="checkFuel" checked>FUEL</div>

        <div class="opt"><input type="checkbox" id="checkWash">WASH</div>
    </div>

    <button class="main-btn" id="btnSearch">ZNAJDŹ ORLEN</button>
    
    <div style="text-align: center;">
        <button id="btnSettingsToggle" style="background:none; color:#CCC; font-size:11px; font-weight:700; padding:10px; width:auto;">USTAWIENIA</button>
    </div>

    <div id="settingsPanel">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span style="font-weight:700; font-size:14px">Stawka świąteczna (+7)</span>
            <input type="checkbox" id="holidaySwitch" style="width:auto; margin:0; transform: scale(1.5);">
        </div>
    </div>

    <div id="historyContainer"></div>
</div>

    let holidayMode = false;
    let excluded = [];
    let currentStation = null;

    window.onload = function() {
        // Управление сессией и ставкой
        const savedHoliday = localStorage.getItem('holiday_active');
        const lastDate = localStorage.getItem('last_session_date');
        const today = new Date().toLocaleDateString();

        if (lastDate === today) {
            holidayMode = savedHoliday === 'true';
        } else {
            localStorage.setItem('last_session_date', today);
            holidayMode = false;
            localStorage.setItem('holiday_active', 'false');
        }

        document.getElementById('holidaySwitch').checked = holidayMode;

        // Привязка событий к кнопкам
        document.getElementById('btnSearch').addEventListener('click', function() { findNearest(false); });
        document.getElementById('btnSettingsToggle').addEventListener('click', toggleSettings);
        document.getElementById('holidaySwitch').addEventListener('change', updateHoliday);
        document.getElementById('btnNawiguj').addEventListener('click', startNavigation);
        document.getElementById('btnNext').addEventListener('click', function() { findNearest(true); });
        document.getElementById('btnCancel').addEventListener('click', closeConfirm);

        renderHistory();
    };

    function toggleSettings() {
        const p = document.getElementById('settingsPanel');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    }

    function updateHoliday() {
        holidayMode = document.getElementById('holidaySwitch').checked;
        localStorage.setItem('holiday_active', holidayMode);
        renderHistory();
    }

    function isOpen(hStr) {
        try {
            const now = new Date();
            const cur = now.getHours() * 60 + now.getMinutes();
            const parts = hStr.split(' - ').map(t => {
                const [h, m] = t.split(':').map(Number);
                return h * 60 + m;
            });
            return parts[1] < parts[0] ? (cur >= parts[0] || cur <= parts[1]) : (cur >= parts[0] && cur <= parts[1]);
        } catch(e) { return true; }
    }

    function findNearest(isNext) {
        const car = document.getElementById('carInput').value.trim().toUpperCase();
        if (!car) { alert("Wprowadź numer rejestracyjny!"); return; }

        if (!isNext) excluded = [];

        navigator.geolocation.getCurrentPosition(pos => {
            const uLat = pos.coords.latitude;
            const uLon = pos.coords.longitude;
            const needV = document.getElementById('checkVacuum').checked;
            const needW = document.getElementById('checkWash').checked;

            const filtered = stations.filter(s => 
                (!needV || s.vac === 1) &&[cite: 1]
                (!needW || s.wash === 1) &&[cite: 1]
                !excluded.includes(s.id) &&[cite: 1]
                isOpen(s.hours)[cite: 1]
            );

            if (filtered.length === 0) {
                alert("Brak dostępnych stacji spełniających kryteria.");
                if (isNext) closeConfirm();
                return;
            }

            currentStation = filtered.reduce((prev, curr) => 
                Math.hypot(uLat - prev.lat, uLon - prev.lon) < Math.hypot(uLat - curr.lat, uLon - curr.lon) ? prev : curr
            );

            excluded.push(currentStation.id);
            
            document.getElementById('confAddress').innerText = currentStation.addr;
            document.getElementById('confComent').innerText = currentStation.com;
            document.getElementById('confHours').innerText = currentStation.hours;
            document.getElementById('confirmScreen').style.display = 'block';
        }, err => {
            alert("Błąd GPS. Sprawdź uprawnienia w ustawieniach Safari.");
        });
    }

    function startNavigation() {
        if (!currentStation) return;
        const car = document.getElementById('carInput').value.trim().toUpperCase();
        const logs = JSON.parse(localStorage.getItem('car_logs_v6') || "[]");
        
        logs.unshift({
            id: Date.now(),
            car: car,
            date: new Date().toLocaleDateString(),
            time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
            earn: holidayMode ? 28 : 21,
            station: currentStation.com
        });

        localStorage.setItem('car_logs_v6', JSON.stringify(logs));
        const url = `https://www.google.com/maps/dir/?api=1&destination=${currentStation.lat},${currentStation.lon}`;
        
        document.getElementById('confirmScreen').style.display = 'none';
        renderHistory();
        window.location.href = url;
    }

    function closeConfirm() { document.getElementById('confirmScreen').style.display = 'none'; }

    function removeLog(id) {
        if (confirm("Usunąć wpis?")) {
            const logs = JSON.parse(localStorage.getItem('car_logs_v6') || "[]");
            localStorage.setItem('car_logs_v6', JSON.stringify(logs.filter(l => l.id !== id)));
            renderHistory();
        }
    }

    function renderHistory() {
        const logs = JSON.parse(localStorage.getItem('car_logs_v6') || "[]");
        const today = new Date().toLocaleDateString();
        const cash = logs.filter(l => l.date === today).reduce((sum, l) => sum + l.earn, 0);

        document.getElementById('totalCash').innerText = cash + " PLN";
        document.getElementById('holidayLabel').style.display = holidayMode ? 'block' : 'none';

        const groups = logs.reduce((acc, l) => {
            if (!acc[l.date]) acc[l.date] = [];
            acc[l.date].push(l);
            return acc;
        }, {});

        let html = '';
        const sortedDates = Object.keys(groups).sort((a, b) => new Date(b) - new Date(a));
        
        for (let date of sortedDates) {
            html += `<div class="date-header">${date === today ? 'Dzisiaj' : date}</div>`;
            html += groups[date].map(l => `
                <div class="log-item">
                    <div><strong>${l.car}</strong><br><small>${l.time} • ${l.station}</small></div>
                    <div style="display:flex; align-items:center;">
                        <span class="earn-green">+${l.earn}</span>
                        <span style="color:#CCC; margin-left:15px; font-size:24px;" onclick="removeLog(${l.id})">×</span>
                    </div>
                </div>
            `).join('');
        }
        document.getElementById('historyContainer').innerHTML = html;
    }
