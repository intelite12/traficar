<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <title>Traficar Service</title>
    <style>
        :root { --purple: #7419AF; --light: #F5F5F5; --text: #000; }
        body { font-family: 'Montserrat', sans-serif; background: #FFF; margin: 0; padding: 20px; color: var(--text); -webkit-font-smoothing: antialiased; }
        h2 { font-weight: 800; font-size: 24px; margin: 0 0 20px 0; letter-spacing: -0.5px; }
        
        .header-stats { margin-bottom: 30px; }
        .money-today { font-size: 28px; font-weight: 800; }
        .holiday-badge { display: inline-block; background: #FFD700; font-size: 10px; padding: 4px 12px; border-radius: 20px; font-weight: 800; margin-top: 5px; }

        input[type="text"] { width: 100%; padding: 18px; border: 1px solid #E0E0E0; border-radius: 15px; font-size: 16px; box-sizing: border-box; margin-bottom: 20px; font-family: 'Montserrat'; background: var(--light); }
        .grid-options { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .opt { background: var(--light); padding: 15px 5px; border-radius: 15px; text-align: center; font-size: 10px; font-weight: 700; color: #666; }
        .opt input { transform: scale(1.2); margin-bottom: 8px; }
        
        button { font-family: 'Montserrat'; border: none; cursor: pointer; transition: opacity 0.2s; width: 100%; }
        button:active { opacity: 0.7; }
        .main-btn { background: var(--purple); color: white; padding: 20px; border-radius: 40px; font-weight: 700; font-size: 16px; margin-bottom: 10px; }
        .secondary-btn { background: var(--light); color: var(--text); padding: 18px; border-radius: 40px; font-weight: 700; font-size: 14px; margin-bottom: 10px; }

        /* ЭКРАН ПОДТВЕРЖДЕНИЯ */
        #confirmScreen { 
            display: none; 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: white; z-index: 9999; padding: 40px 20px; box-sizing: border-box; 
        }
        .info-table { width: 100%; margin: 30px 0; border-spacing: 0 15px; }
        .info-table td { font-size: 14px; vertical-align: top; }
        .info-table td:first-child { font-weight: 700; color: #999; width: 35%; }

        /* История */
        .date-header { font-size: 12px; color: #999; font-weight: 700; margin: 30px 0 10px; text-transform: uppercase; }
        .log-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #EEE; }
        .earn-text { color: #27AE60; font-weight: 800; font-size: 16px; }
        
        .settings-panel { display: none; margin-top: 20px; padding-top: 20px; border-top: 1px solid #EEE; }
    </style>
</head>
<body>

<div id="confirmScreen">
    <h2>Детали маршрута</h2>
    <table class="info-table">
        <tr><td>📍 Адрес</td><td id="confAddress"></td></tr>
        <tr><td>💬 Коммент</td><td id="confComent"></td></tr>
        <tr><td>🕒 Работает</td><td id="confHours"></td></tr>
    </table>
    <button class="main-btn" onclick="confirmAndGo()">NAWIGUJ</button>
    <button class="secondary-btn" onclick="findWork(true)">СЛЕДУЮЩИЙ ВАРИАНТ</button>
    <button class="secondary-btn" style="background:none; color:#999" onclick="closeConfirm()">ОТМЕНА</button>
</div>

<div id="appUI">
    <div class="header-stats">
        <div style="font-size: 12px; font-weight: 700; color: #999; margin-bottom: 5px;">ZAROBEK DZISIAJ:</div>
        <div class="money-today" id="todaySum">0 PLN</div>
        <div id="holidayIndicator" class="holiday-badge">ПРАЗДНИЧНАЯ СТАВКА</div>
    </div>

    <h2>Zlecenia</h2>
    <input type="text" id="carNumber" placeholder="Numer rejestracyjny" autocomplete="off">
    
    <div class="grid-options">
        <div class="opt"><input type="checkbox" id="petrol" checked><br>FUEL</div>
        <div class="opt"><input type="checkbox" id="vacuum"><br>VACUUM</div>
        <div class="opt"><input type="checkbox" id="wash"><br>WASH</div>
    </div>

    <button class="main-btn" onclick="findWork(false)">ZNAJDŹ ORLEN</button>
    
    <div style="text-align: center;">
        <button onclick="toggleSettings()" style="background:none; color:#CCC; font-size:11px; font-weight:700; padding: 10px;">USTAWIENIA</button>
    </div>

    <div id="settings" class="settings-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
            <span style="font-weight:700; font-size:14px">Праздничная ставка (+7)</span>
            <input type="checkbox" id="holidayToggle" onchange="toggleHoliday()" style="transform: scale(1.5);">
        </div>
        <button class="secondary-btn" style="width:100%" onclick="toggleSettings()">ЗАКРЫТЬ</button>
    </div>

    <div id="historyList"></div>
</div>

    let state = { holidayMode: false, lastDate: new Date().toLocaleDateString() };
    let currentStation = null;
    let excluded = [];

    function init() {
        const saved = JSON.parse(localStorage.getItem('traficar_v5_state'));
        const today = new Date().toLocaleDateString();
        if(saved) {
            state = saved;
            if(state.lastDate !== today) {
                state.holidayMode = false;
                state.lastDate = today;
                localStorage.setItem('traficar_v5_state', JSON.stringify(state));
            }
        }
        document.getElementById('holidayToggle').checked = state.holidayMode;
        render();
    }

    function isStationOpen(hours) {
        try {
            const now = new Date();
            const cur = now.getHours() * 60 + now.getMinutes();
            const [start, end] = hours.split(' - ').map(t => {
                const [h, m] = t.split(':').map(Number);
                return h * 60 + m;
            });
            return end < start ? (cur >= start || cur <= end) : (cur >= start && cur <= end);
        } catch(e) { return true; }
    }

    function findWork(isNext) {
        const car = document.getElementById('carNumber').value.toUpperCase().trim();
        if(!car) { alert("Введите номер!"); return; }
        if(!isNext) excluded = [];

        navigator.geolocation.getCurrentPosition(pos => {
            const uLat = pos.coords.latitude;
            const uLon = pos.coords.longitude;
            const v = document.getElementById('vacuum').checked;
            const w = document.getElementById('wash').checked;

            let filtered = orlenData.filter(s => 
                (!v || s.vacuum === 1) &&[cite: 1]
                (!w || s.wash === 1) &&[cite: 1]
                !excluded.includes(s.id) &&[cite: 1]
                isStationOpen(s.open_hours)[cite: 1]
            );

            if(!filtered.length) {
                alert("Нет доступных заправок");
                if(isNext) closeConfirm();
                return;
            }

            currentStation = filtered.reduce((prev, curr) => 
                Math.hypot(uLat-prev.lat, uLon-prev.lon) < Math.hypot(uLat-curr.lat, uLon-curr.lon) ? prev : curr
            );

            excluded.push(currentStation.id);
            
            document.getElementById('confAddress').innerText = currentStation.adress;
            document.getElementById('confComent').innerText = currentStation.coment;
            document.getElementById('confHours').innerText = currentStation.open_hours;
            document.getElementById('confirmScreen').style.display = 'block';
        }, err => {
            alert("Ошибка геолокации. Проверьте разрешения Safari.");
        });
    }

    function confirmAndGo() {
        if(!currentStation) return;
        const car = document.getElementById('carNumber').value.toUpperCase().trim();
        const logs = JSON.parse(localStorage.getItem('traficar_v5_logs') || "[]");
        
        logs.unshift({
            id: Date.now(), 
            car, 
            date: new Date().toLocaleDateString(),
            time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
            earn: state.holidayMode ? 28 : 21,
            station: currentStation.coment
        });
        
        localStorage.setItem('traficar_v5_logs', JSON.stringify(logs));
        const url = `https://www.google.com/maps/dir/?api=1&destination=${currentStation.lat},${currentStation.lon}`;
        
        closeConfirm();
        render();
        window.location.href = url;
    }

    function closeConfirm() { document.getElementById('confirmScreen').style.display = 'none'; }
    
    function toggleSettings() { 
        const s = document.getElementById('settings');
        s.style.display = (s.style.display === 'block') ? 'none' : 'block';
    }

    function toggleHoliday() {
        state.holidayMode = document.getElementById('holidayToggle').checked;
        localStorage.setItem('traficar_v5_state', JSON.stringify(state));
        render();
    }

    function deleteEntry(id) {
        if(confirm("Удалить запись?")) {
            const h = JSON.parse(localStorage.getItem('traficar_v5_logs') || "[]");
            localStorage.setItem('traficar_v5_logs', JSON.stringify(h.filter(i => i.id !== id)));
            render();
        }
    }

    function render() {
        const logs = JSON.parse(localStorage.getItem('traficar_v5_logs') || "[]");
        const today = new Date().toLocaleDateString();
        const todayEarn = logs.filter(i => i.date === today).reduce((s, i) => s + i.earn, 0);
        
        document.getElementById('todaySum').innerText = todayEarn + " PLN";
        document.getElementById('holidayIndicator').style.display = state.holidayMode ? 'block' : 'none';

        const groups = logs.reduce((acc, i) => {
            if(!acc[i.date]) acc[i.date] = [];
            acc[i.date].push(i);
            return acc;
        }, {});

        let html = '';
        for(let date in groups) {
            html += `<div class="date-header">${date === today ? 'Сегодня' : date}</div>`;
            html += groups[date].map(i => `
                <div class="log-item">
                    <div><strong>${i.car}</strong><br><small>${i.time} • ${i.station}</small></div>
                    <div style="display:flex; align-items:center">
                        <span class="earn-text">+${i.earn}</span>
                        <span style="color:#CCC; margin-left:15px; font-size:20px" onclick="deleteEntry(${i.id})">×</span>
                    </div>
                </div>
            `).join('');
        }
        document.getElementById('historyList').innerHTML = html;
    }
